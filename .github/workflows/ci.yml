name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: davidcozens/cpputest:sha-ee85f20

    steps:
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset debug

      - name: Build and test
        run: cmake --build --preset debug --target junit

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/debug/cpputest_*.xml

  sanitize:
    runs-on: ubuntu-latest
    container:
      image: davidcozens/cpputest:sha-ee85f20

    steps:
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset sanitize

      - name: Build and test
        run: cmake --build --preset sanitize --target junit

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/sanitize/cpputest_*.xml

  coverage:
    runs-on: ubuntu-latest
    container:
      image: davidcozens/cpputest:sha-ee85f20

    steps:
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset coverage

      - name: Build and generate coverage report
        run: cmake --build --preset coverage --target coverage

      - name: Post coverage summary
        run: |
          echo '## Coverage Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary build/coverage/coverage.filtered.info 2>&1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/coverage_report/

  tidy:
    runs-on: ubuntu-latest
    container:
      image: davidcozens/cpputest:sha-ee85f20

    steps:
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset tidy

      - name: Build with clang-tidy
        run: cmake --build --preset tidy
